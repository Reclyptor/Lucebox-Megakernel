name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
      - master
    paths:
      - Dockerfile
  workflow_dispatch:
    inputs:
      megakernel_version:
        description: "Lucebox Hub commit SHA to build. Defaults to latest commit on main."
        required: false
        default: ""
  workflow_call:
    inputs:
      megakernel_version:
        description: "Lucebox Hub commit SHA to build."
        type: string
        required: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Megakernel Version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INPUT_VERSION="${{ inputs.megakernel_version }}"
          if [ -n "${INPUT_VERSION}" ]; then
            SHA="${INPUT_VERSION}"
          else
            SHA=$(gh api repos/Luce-Org/lucebox-hub/commits/main --jq '.sha')
          fi
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "short=${SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Set Lowercase Image Name
        id: image
        run: |
          echo "name=${{ env.REGISTRY }}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log In to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.version.outputs.short }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MEGAKERNEL_VERSION=${{ steps.version.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
