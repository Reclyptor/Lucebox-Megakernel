name: Check for New Megakernel Releases

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      version: ${{ steps.release.outputs.version }}
      needs_build: ${{ steps.check.outputs.needs_build }}

    steps:
      - name: Get Latest Lucebox Hub Commit
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(gh api repos/Luce-Org/lucebox-hub/commits/main --jq '.sha' 2>/dev/null || true)
          if [ -z "${SHA}" ]; then
            echo "Could not fetch latest commit — skipping."
            echo "version=" >> "$GITHUB_OUTPUT"
          else
            echo "version=${SHA}" >> "$GITHUB_OUTPUT"
            echo "Latest lucebox-hub commit: ${SHA}"
          fi

      - name: Log In to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check If Image Tag Already Exists
        id: check
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          SHORT="${VERSION:0:7}"
          IMAGE="ghcr.io/reclyptor/lucebox-megakernel:${SHORT}"
          if docker manifest inspect "${IMAGE}" > /dev/null 2>&1; then
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
            echo "${IMAGE} already exists — no build needed."
          else
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            echo "${IMAGE} not found — triggering build."
          fi

  build:
    needs: check
    if: needs.check.outputs.needs_build == 'true' && needs.check.outputs.version != ''
    uses: ./.github/workflows/build.yml
    with:
      megakernel_version: ${{ needs.check.outputs.version }}
    permissions:
      contents: read
      packages: write
    secrets: inherit
